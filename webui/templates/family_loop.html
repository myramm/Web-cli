{% extends "base.html" %}
{% block title %}Loop Beli Family · me-cli{% endblock %}
{% block content %}
<div class="max-w-md mx-auto">
  <div class="card">
    <h1 class="text-xl font-bold mb-3"><svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" class="inline-block"><polyline points="23 4 23 10 17 10"></polyline><polyline points="1 20 1 14 7 14"></polyline><path d="M3.51 9a9 9 0 0 1 14.85-3.36L23 10M1 14l4.64 4.36A9 9 0 0 0 20.49 15"></path></svg> Loop Beli Family</h1>
    <p class="text-xs text-slate-400 mb-3">Beli berurutan semua opsi dalam satu family code. Pakai metode <b>balance</b>.</p>
    <form action="/purchase/family-loop/start" method="post" class="space-y-3"
          data-confirm="Loop bakal beli SEMUA opsi paket di family <span class='font-mono text-amber-300'>{field:family_code}</span> pakai metode <b>Pulsa</b>, mulai dari opsi #{field:start_from}. Pastiin saldo pulsa cukup banyak — tiap opsi yang sukses bakal dipotong dari saldo lo."
          data-confirm-title="<svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" class="inline-block mr-1"><path d="M10.29 3.86L1.82 18a2 2 0 0 0 1.71 3h16.94a2 2 0 0 0 1.71-3L13.71 3.86a2 2 0 0 0-3.42 0z"></path><line x1="12" y1="9" x2="12" y2="13"></line><line x1="12" y1="17" x2="12.01" y2="17"></line></svg> Loop Pembelian — Yakin?"
          data-confirm-variant="warning"
          data-confirm-ok="Mulai Loop">
      <div>
        <label class="label">Family Code</label>
        <input class="form-input font-mono" type="text" name="family_code" value="{{ family_code }}" required>
      </div>
      <div>
        <label class="label">Mulai dari opsi ke-</label>
        <input class="form-input" type="number" name="start_from" value="1" min="1">
      </div>
      <div>
        <label class="label">Delay antar pembelian (detik)</label>
        <input class="form-input" type="number" name="delay_seconds" value="0" min="0" max="60">
      </div>
      <label class="flex items-center gap-2 text-sm">
        <input type="checkbox" name="use_decoy" value="true">
        Pakai decoy
      </label>
      <button class="btn btn-primary w-full" type="submit">Mulai</button>
    </form>
  </div>
</div>
{% endblock %}
