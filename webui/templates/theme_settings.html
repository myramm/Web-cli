{% extends "base.html" %}
{% block title %}Tema · me-cli{% endblock %}
{% block content %}
<div class="max-w-lg mx-auto">

  <h1 class="text-2xl font-bold mb-1"><svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" class="inline-block mr-1"><path d="M12 2C6.48 2 2 6.48 2 12s4.48 10 10 10c1.38 0 2.5-1.12 2.5-2.5 0-.61-.23-1.17-.61-1.61-.31-.35-.5-.81-.5-1.32 0-1.1.9-2 2-2h1.61c2.97 0 5.42-2.45 5.42-5.42C22 6.48 17.52 2 12 2zm-4.5 9c-.83 0-1.5-.67-1.5-1.5S6.67 8 7.5 8 9 8.67 9 9.5 8.33 11 7.5 11zm4-4c-.83 0-1.5-.67-1.5-1.5S10.67 4 11.5 4s1.5.67 1.5 1.5S12.33 7 11.5 7zm4.5 4c-.83 0-1.5-.67-1.5-1.5s.67-1.5 1.5-1.5 1.5.67 1.5 1.5-.67 1.5-1.5 1.5z"></path></svg> Pengaturan Tema</h1>
  <p class="text-sm text-slate-400 dark:text-slate-400 light-text-muted mb-6">Pilih tampilan yang lo suka</p>

  {% if msg %}
  <div class="alert-success">{{ msg }}</div>
  {% endif %}

  <form action="/settings/theme" method="post" class="space-y-4" data-no-loader>
    <div class="grid grid-cols-2 gap-4">

      <!-- Dark Theme Card -->
      <label class="cursor-pointer group">
        <input type="radio" name="theme" value="dark" class="hidden peer" {% if current_theme == 'dark' %}checked{% endif %}>
        <div class="card relative overflow-hidden transition-all peer-checked:border-indigo-500 peer-checked:shadow-lg peer-checked:shadow-indigo-500/20 group-hover:border-slate-600">
          <!-- Mini preview -->
          <div class="rounded-lg overflow-hidden mb-3 border border-slate-700">
            <div class="bg-slate-900 p-2">
              <div class="h-2 w-12 bg-slate-700 rounded mb-1"></div>
              <div class="h-2 w-8 bg-slate-800 rounded"></div>
            </div>
            <div class="bg-slate-950 p-2 space-y-1">
              <div class="h-2 w-full bg-slate-800 rounded"></div>
              <div class="h-2 w-3/4 bg-slate-800 rounded"></div>
              <div class="h-3 w-16 bg-indigo-600 rounded mt-2"></div>
            </div>
          </div>
          <div class="flex items-center gap-2">
            <span class="text-indigo-400">
              <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"></path></svg>
            </span>
            <div>
              <div class="font-semibold text-sm">Dark</div>
              <div class="text-xs text-slate-400">Tema gelap (default)</div>
            </div>
          </div>
          <!-- Checkmark -->
          <div class="absolute top-2 right-2 w-6 h-6 rounded-full bg-indigo-600 text-white flex items-center justify-center text-xs opacity-0 peer-checked:opacity-100 transition-opacity"><svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" class="inline-block"><polyline points="20 6 9 17 4 12"></polyline></svg></div>
        </div>
      </label>

      <!-- Light Theme Card -->
      <label class="cursor-pointer group">
        <input type="radio" name="theme" value="light" class="hidden peer" {% if current_theme == 'light' %}checked{% endif %}>
        <div class="card relative overflow-hidden transition-all peer-checked:border-indigo-500 peer-checked:shadow-lg peer-checked:shadow-indigo-500/20 group-hover:border-slate-600">
          <!-- Mini preview -->
          <div class="rounded-lg overflow-hidden mb-3 border border-slate-300">
            <div class="bg-white p-2">
              <div class="h-2 w-12 bg-gray-200 rounded mb-1"></div>
              <div class="h-2 w-8 bg-gray-100 rounded"></div>
            </div>
            <div class="bg-gray-50 p-2 space-y-1">
              <div class="h-2 w-full bg-gray-200 rounded"></div>
              <div class="h-2 w-3/4 bg-gray-200 rounded"></div>
              <div class="h-3 w-16 bg-indigo-600 rounded mt-2"></div>
            </div>
          </div>
          <div class="flex items-center gap-2">
            <span class="text-amber-500">
              <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="5"></circle><line x1="12" y1="1" x2="12" y2="3"></line><line x1="12" y1="21" x2="12" y2="23"></line><line x1="4.22" y1="4.22" x2="5.64" y2="5.64"></line><line x1="18.36" y1="18.36" x2="19.78" y2="19.78"></line><line x1="1" y1="12" x2="3" y2="12"></line><line x1="21" y1="12" x2="23" y2="12"></line><line x1="4.22" y1="19.78" x2="5.64" y2="18.36"></line><line x1="18.36" y1="5.64" x2="19.78" y2="4.22"></line></svg>
            </span>
            <div>
              <div class="font-semibold text-sm">Light</div>
              <div class="text-xs text-slate-400">Tema terang / clean</div>
            </div>
          </div>
          <!-- Checkmark -->
          <div class="absolute top-2 right-2 w-6 h-6 rounded-full bg-indigo-600 text-white flex items-center justify-center text-xs opacity-0 peer-checked:opacity-100 transition-opacity"><svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" class="inline-block"><polyline points="20 6 9 17 4 12"></polyline></svg></div>
        </div>
      </label>

    </div>

    <button class="btn btn-primary w-full" type="submit"><svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" class="inline-block mr-1"><path d="M19 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h11l5 5v11a2 2 0 0 1-2 2z"></path><polyline points="17 21 17 13 7 13 7 21"></polyline><polyline points="7 3 7 8 15 8"></polyline></svg> Simpan Tema</button>
  </form>

</div>
{% endblock %}
